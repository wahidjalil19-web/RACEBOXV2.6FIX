<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RACE BOX PRO MAX+ V2.6 FIX</title>
<style>
body{margin:0;font-family:Arial;background:#111;color:white;text-align:center;}
.header{padding:20px;font-size:28px;font-weight:bold;color:#00ff9c;}
.container{padding:20px;max-width:700px;margin:auto;}
.timer{font-size:60px;font-weight:bold;margin:20px 0;color:#00ff9c;}
.status{font-size:14px;color:#aaa;margin-bottom:10px;}
.speedContainer{display:flex;justify-content:center;gap:20px;margin:20px 0;flex-wrap:wrap;}
.speedometer{position:relative;width:200px;height:200px;}
.speedometer svg{transform:rotate(-90deg);}
.speed-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:16px;font-weight:bold;color:#00ff9c;}
.speed-text span{font-size:28px;}
.panel{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-top:20px;}
.card{background:#222;padding:15px;border-radius:10px;}
.card span{font-size:18px;color:#00ff9c;}
.buttons{margin-top:20px;}
button{font-size:16px;padding:10px 16px;margin:5px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;}
.start{background:#00ff9c;color:black;}
.reset{background:#ff3b3b;color:white;}
.historybtn{background:#2b7cff;color:white;}
.stop{background:#ff9900;color:black;}
.lap{background:#ffcc00;color:black;}
#history{margin-top:20px;text-align:left;}
.historyCard{background:#222;padding:10px;border-radius:8px;margin:6px 0;}
.chart-container{margin-top:30px;}
canvas{background:#222;border-radius:10px;}
.footer{margin-top:20px;font-size:14px;color:#777;}
</style>
</head>
<body>

<div class="header">RACE BOX PRO MAX+ V2.6 FIX</div>
<div class="container">

<div class="status" id="gpsStatus">GPS: waiting...</div>
<div class="timer" id="timer">0.000</div>

<div class="speedContainer">
  <div class="speedometer">
    <svg width="200" height="200">
      <circle cx="100" cy="100" r="90" stroke="#444" stroke-width="15" fill="none"/>
      <circle id="speedArc" cx="100" cy="100" r="90" stroke="#00ff9c" stroke-width="15" fill="none" stroke-dasharray="565" stroke-dashoffset="565" stroke-linecap="round"/>
    </svg>
    <div class="speed-text">Speed<br><span id="speed">0</span> km/h</div>
  </div>
  <div class="speedometer">
    <svg width="200" height="200">
      <circle cx="100" cy="100" r="90" stroke="#444" stroke-width="15" fill="none"/>
      <circle id="topArc" cx="100" cy="100" r="90" stroke="#00ff9c" stroke-width="15" fill="none" stroke-dasharray="565" stroke-dashoffset="565" stroke-linecap="round"/>
    </svg>
    <div class="speed-text">Top Speed<br><span id="topspeed">0</span> km/h</div>
  </div>
  <div class="speedometer">
    <svg width="200" height="200">
      <circle cx="100" cy="100" r="90" stroke="#444" stroke-width="15" fill="none"/>
      <circle id="avgArc" cx="100" cy="100" r="90" stroke="#ffcc00" stroke-width="15" fill="none" stroke-dasharray="565" stroke-dashoffset="565" stroke-linecap="round"/>
    </svg>
    <div class="speed-text">Avg Speed<br><span id="avgspeed">0</span> km/h</div>
  </div>
</div>

<div class="panel">
  <div class="card">0-60<br><span id="zero60">-</span>s</div>
  <div class="card">60m<br><span id="m60">-</span>s</div>
  <div class="card">201m<br><span id="m201">-</span>s</div>
  <div class="card">401m<br><span id="m401">-</span>s</div>
  <div class="card">501m<br><span id="m501">-</span>s</div>
  <div class="card">Lap<br><span id="lapCount">0</span></div>
</div>

<div class="buttons">
  <button class="start" onclick="startRace()">START</button>
  <button class="stop" onclick="stopRace()">STOP</button>
  <button class="reset" onclick="resetRace()">RESET</button>
  <button class="lap" onclick="newLap()">NEW LAP</button>
  <button class="historybtn" onclick="showHistory()">HISTORY</button>
  <button onclick="clearHistory()">CLEAR HISTORY</button>
  <button onclick="exportHistory()">EXPORT</button>
</div>

<div id="history"></div>

<div class="chart-container">
  <canvas id="speedChart" height="150"></canvas>
  <canvas id="distanceChart" height="150"></canvas>
</div>

<div class="footer">JavaTech Racing Technology</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
let watchID, startTime, startPos;
let raceStarted=false;
let riderName="";
let topSpeed=0,lastSpeed=0;
let totalSpeed=0,speedCount=0;
let lapCount=0;
let zero60done=false,m60done=false,m201done=false,m401done=false,m501done=false;
let t60=0,t201=0,t401=0,t501=0;
let timeData=[],speedData=[],distanceData=[],lastChartUpdate=0;

const speedChart=new Chart(document.getElementById('speedChart'),{type:'line',data:{labels:[],datasets:[{label:'Speed',data:[],borderColor:'#00ff9c',tension:0.3}]},options:{animation:false,responsive:true}});
const distanceChart=new Chart(document.getElementById('distanceChart'),{type:'line',data:{labels:[],datasets:[{label:'Distance',data:[],borderColor:'#ff9900',tension:0.3}]},options:{animation:false,responsive:true}});

function resetCharts(){
  timeData=[]; speedData=[]; distanceData=[];
  speedChart.data.labels=[]; speedChart.data.datasets[0].data=[]; speedChart.update();
  distanceChart.data.labels=[]; distanceChart.data.datasets[0].data=[]; distanceChart.update();
}

function startRace(){
  resetVariables(); resetCharts();
  riderName=prompt("Masukkan Nama Rider");
  if(!riderName){alert("Nama rider wajib diisi"); return;}
  if(!navigator.geolocation){alert("GPS tidak tersedia"); return;}
  navigator.geolocation.getCurrentPosition(pos=>{
    startPos=pos.coords;
    watchID=navigator.geolocation.watchPosition(updateRace,error,{enableHighAccuracy:true,maximumAge:0,timeout:10000});
  },error,{enableHighAccuracy:true});
}

function resetVariables(){
  topSpeed=0; lastSpeed=0; raceStarted=false;
  totalSpeed=0; speedCount=0; lapCount=0;
  zero60done=false;m60done=false;m201done=false;m401done=false;m501done=false;
  t60=0;t201=0;t401=0;t501=0;
  document.getElementById('lapCount').innerText=lapCount;
  document.getElementById('avgspeed').innerText=0;
}

function newLap(){
  if(raceStarted){
    lapCount++; totalSpeed=0; speedCount=0;
    document.getElementById('lapCount').innerText=lapCount;
    document.getElementById('avgspeed').innerText=0;
  }
}

function updateRace(pos){
  let accuracy=pos.coords.accuracy||999;
  document.getElementById("gpsStatus").innerText=accuracy>20?`GPS lemah ${accuracy.toFixed(1)} m`:`GPS akurat ${accuracy.toFixed(1)} m`;
  let gpsSpeed=(pos.coords.speed||0)*3.6;
  let speed=(gpsSpeed*0.5)+(lastSpeed*0.5); lastSpeed=speed;
  if(speed<0.5)speed=0;
  document.getElementById("speed").innerText=speed.toFixed(1);
  updateSpeedometer(speed);
  if(speed>topSpeed){topSpeed=speed; document.getElementById("topspeed").innerText=topSpeed.toFixed(1); updateTopSpeed(topSpeed);}
  if(raceStarted){totalSpeed+=speed; speedCount++; document.getElementById('avgspeed').innerText=(totalSpeed/speedCount).toFixed(1); updateAvgSpeed(totalSpeed/speedCount);}
  let distance=getDistance(startPos.latitude,startPos.longitude,pos.coords.latitude,pos.coords.longitude);
  if(speed>7 && distance>5 && !raceStarted){raceStarted=true; startTime=Date.now(); document.getElementById("gpsStatus").innerText="Race Started";}
  if(!raceStarted) return;
  let time=(Date.now()-startTime)/1000;
  document.getElementById("timer").innerText=time.toFixed(3);
  if(speed>=60 && !zero60done){zero60done=true; document.getElementById("zero60").innerText=time.toFixed(3);}
  if(distance>=60 && !m60done){m60done=true; t60=time; document.getElementById("m60").innerText=time.toFixed(3);}
  if(distance>=201 && !m201done){m201done=true; t201=time; document.getElementById("m201").innerText=time.toFixed(3);}
  if(distance>=401 && !m401done){m401done=true; t401=time; document.getElementById("m401").innerText=time.toFixed(3);}
  if(distance>=501 && !m501done){m501done=true; t501=time; saveHistory(); showHistory(); stopRace();}
  if(Date.now()-lastChartUpdate>500){
    timeData.push(time.toFixed(2)); speedData.push(speed.toFixed(1)); distanceData.push(distance.toFixed(1));
    if(timeData.length>120){timeData.shift(); speedData.shift(); distanceData.shift();}
    speedChart.data.labels=timeData; speedChart.data.datasets[0].data=speedData; speedChart.update();
    distanceChart.data.labels=timeData; distanceChart.data.datasets[0].data=distanceData; distanceChart.update();
    lastChartUpdate=Date.now();
  }
}

function stopRace(){navigator.geolocation.clearWatch(watchID); raceStarted=false; document.getElementById("gpsStatus").innerText="Race stopped"; saveHistory(); showHistory();}
function updateSpeedometer(speed){document.getElementById("speedArc").style.strokeDashoffset=565-(565*Math.min(speed/200,1));}
function updateTopSpeed(speed){document.getElementById("topArc").style.strokeDashoffset=565-(565*Math.min(speed/200,1));}
function updateAvgSpeed(speed){document.getElementById("avgArc").style.strokeDashoffset=565-(565*Math.min(speed/200,1));}

function saveHistory(){
  let history=JSON.parse(localStorage.getItem("raceHistory"))||[];
  let data={name:riderName,top:topSpeed.toFixed(1),avg:(speedCount>0?(totalSpeed/speedCount).toFixed(1):"-"),
    t60:t60?t60.toFixed(3):"-",t201:t201?t201.toFixed(3):"-",t401:t401?t401.toFixed(3):"-",t501:t501?t501.toFixed(3):"-",
    lap:lapCount,date:new Date().toLocaleString()};
  history.push(data); localStorage.setItem("raceHistory",JSON.stringify(history));
}

function showHistory(){
  let history=JSON.parse(localStorage.getItem("raceHistory"))||[];
  if(history.length==0){document.getElementById("history").innerHTML="<h2>History kosong</h2>"; return;}
  let list=[...history].reverse(); let text="<h2>History</h2>";
  list.forEach((h,i)=>{text+=`<div class="historyCard">
  Run ${list.length-i} - ${h.name}<br>Date: ${h.date}<br>Top Speed: ${h.top} km/h<br>Avg Speed: ${h.avg} km/h<br>60m: ${h.t60} s<br>201m: ${h.t201} s<br>401m: ${h.t401} s<br>501m: ${h.t501} s<br>Laps: ${h.lap}</div>`;});
  document.getElementById("history").innerHTML=text;
}

function clearHistory(){if(confirm("Hapus semua history?")){localStorage.removeItem("raceHistory"); document.getElementById("history").innerHTML="History kosong";}}
function exportHistory(){let data=localStorage.getItem("raceHistory"); if(!data){alert("Tidak ada history"); return;} let blob=new Blob([data],{type:"application/json"}); let a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="race_history.json"; a.click();}
function resetRace(){navigator.geolocation.clearWatch(watchID); location.reload();}
function getDistance(lat1,lon1,lat2,lon2){let R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180,a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2,c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));return R*c;}
function error(){alert("GPS error");}
window.onload=function(){showHistory();}
</script>
</body>
</html>
